name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Build installers (Windows: MSI + NSIS, macOS: dmg/zip, Linux: AppImage/deb)
      # and upload them to a draft GitHub Release for this tag.
      - run: npm run release -w @kotrain/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple Developer cert: skip electron-builder's signing discovery
          # (the afterPack hook ad-hoc signs the macOS app instead).
          CSC_IDENTITY_AUTO_DISCOVERY: false
